<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeatherShot — Annotate Screenshot</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="editor">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="toolbar">
      <div class="tool-group">
        <button id="tool-step" class="tool-btn active" title="Step Arrow">1→</button>
        <button id="tool-step-rect" class="tool-btn" title="Step Rectangle">1▢</button>
        <button id="tool-arrow" class="tool-btn" title="Arrow">↗</button>
        <button id="tool-rect" class="tool-btn" title="Rectangle">▢</button>
        <button id="tool-line" class="tool-btn" title="Line">╱</button>
        <button id="tool-question-arrow" class="tool-btn" title="Question Arrow">?→</button>
        <button id="tool-question-rect" class="tool-btn" title="Question Rectangle">?▢</button>
        <button id="tool-abc-arrow" class="tool-btn" title="ABC Arrow">a→</button>
        <button id="tool-abc-rect" class="tool-btn" title="ABC Rectangle">a▢</button>
        <button id="tool-circle" class="tool-btn" title="Circle / Ellipse">◯</button>
      </div>
      <div class="sep"></div>
      <input type="color" id="color" value="#FF3B30">
      <input type="range" id="width" min="2" max="15" value="4">
      <span id="w-label">4px</span>
      <div class="spacer"></div>
      <button id="undo" class="act">Undo</button>
      <button id="clear" class="act danger">Clear</button>
      <button id="save" class="act primary">💾 Save & Download</button>
    </div>
  </div>
  <script src="editor.js"></script>
</body>
</html>
