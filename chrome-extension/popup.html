<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0066FF 0%, #00CCCC 100%);
      color: #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 36px; height: 36px; border-radius: 8px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header span { font-size: 10px; opacity: 0.8; display: block; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: rgba(255,255,255,0.35); }
    .btn:active { transform: scale(0.98); }
    .caption {
      text-align: center;
      font-size: 10px;
      opacity: 0.7;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="🪶">
    <div>
      <h1>FeatherShot</h1>
      <span>v1.1.1 · Browser Extension</span>
    </div>
  </div>
  <button class="btn" id="capture">
    📸 Capture This Tab
  </button>
  <p class="caption">Opens the annotation editor in a new tab</p>
  <script src="popup.js"></script>
</body>
</html>
