<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeatherShot Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="editor">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <div id="toolbar">
      <div class="tool-group">
        <button id="tool-step-arrow" class="tool-btn active" title="Step Arrow (1)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="6" cy="17" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="6" y="20" text-anchor="middle" font-size="8" fill="currentColor">1</text><path d="M9 14L18 7M18 7H12M18 7V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button id="tool-step-rect" class="tool-btn" title="Step Rectangle (2)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="5" y="7.5" text-anchor="middle" font-size="7" fill="currentColor">1</text><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button id="tool-arrow" class="tool-btn" title="Arrow (3)">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M7 17L17 7M17 7H8M17 7V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button id="tool-rect" class="tool-btn" title="Rectangle (4)">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button id="tool-circle" class="tool-btn" title="Circle / Ellipse (5)">
          <svg viewBox="0 0 24 24" width="18" height="18"><ellipse cx="12" cy="12" rx="10" ry="8" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button id="tool-line" class="tool-btn" title="Line (6)">
          <svg viewBox="0 0 24 24" width="18" height="18"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button id="tool-question-arrow" class="tool-btn" title="Question Arrow (7)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="6" cy="17" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="6" y="20" text-anchor="middle" font-size="8" font-weight="bold" fill="currentColor">?</text><path d="M9 14L18 7M18 7H12M18 7V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button id="tool-question-rect" class="tool-btn" title="Question Rectangle (8)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="5" y="7.5" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">?</text><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button id="tool-abc-arrow" class="tool-btn" title="ABC Arrow (9)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="6" cy="17" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="6" y="20" text-anchor="middle" font-size="8" fill="currentColor">a</text><path d="M9 14L18 7M18 7H12M18 7V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button id="tool-abc-rect" class="tool-btn" title="ABC Rectangle (0)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="5" y="7.5" text-anchor="middle" font-size="7" fill="currentColor">a</text><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button id="tool-magnifier" class="tool-btn" title="Magnifier (M)">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="2" fill="none"/><line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="10" x2="12" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="8" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="separator"></div>

      <div class="tool-group">
        <input type="color" id="color-picker" value="#FF3B30" title="Color">
        <div class="width-control">
          <input type="range" id="line-width" min="2" max="15" value="4" title="Line Width">
          <span id="width-label">4px</span>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="tool-group actions">
        <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)">Undo</button>
        <button id="btn-clear" class="action-btn danger" title="Clear All">Clear</button>
        <button id="btn-save" class="action-btn primary" title="Save & Copy (Ctrl+S)">
          💾 Save & Copy
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
