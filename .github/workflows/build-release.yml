name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── macOS (Native Swift) ──────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Release Binary
        run: swift build -c release

      - name: Generate DMG Background
        run: |
          if [ -f generate_assets.swift ]; then
            swift generate_assets.swift || true
          fi
          # Create a simple background if generate_assets didn't produce one
          if [ ! -f dmg_background.png ]; then
            sips -z 400 600 icon_1024.png --out dmg_background.png 2>/dev/null || true
          fi

      - name: Build App Bundle & DMG
        run: |
          chmod +x build_release.sh
          ./build_release.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "FeatherShot*.dmg"

  # ─── Windows & Linux (Electron) ────────────────────────────────────
  build-electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: electron-app
        run: npm ci

      - name: Generate Platform Icons
        working-directory: electron-app
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            # Windows needs .ico — use electron-icon-builder or convert with magick
            npm install --no-save png2icons 2>/dev/null || true
            npx -y electron-icon-maker --input=../icon_1024.png --output=assets 2>/dev/null || true
            # Fallback: if ico wasn't created, install imagemagick
            if [ ! -f assets/icon.ico ] && [ ! -f assets/icons/win/icon.ico ]; then
              if command -v magick >/dev/null 2>&1; then
                magick ../icon_1024.png -define icon:auto-resize=256,128,64,48,32,16 assets/icon.ico
              elif command -v convert >/dev/null 2>&1; then
                convert ../icon_1024.png -define icon:auto-resize=256,128,64,48,32,16 assets/icon.ico
              fi
            fi
            # Copy from nested output if needed
            if [ -f assets/icons/win/icon.ico ] && [ ! -f assets/icon.ico ]; then
              cp assets/icons/win/icon.ico assets/icon.ico
            fi
          fi

      - name: Build Electron App
        working-directory: electron-app
        run: npm run build:${{ matrix.platform }}
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.deb
            electron-app/dist/*.AppImage

  # ─── Chrome Extension ──────────────────────────────────────────────
  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Chrome Extension
        run: |
          cd chrome-extension
          zip -r ../FeatherShot-Chrome-Extension.zip . -x ".*"

      - name: Upload Chrome Extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: FeatherShot-Chrome-Extension.zip

  # ─── Create GitHub Release ─────────────────────────────────────────
  release:
    needs: [build-macos, build-electron, build-chrome]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.zip
